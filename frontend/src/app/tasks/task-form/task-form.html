<div class="container mt-4 d-flex justify-content-center">
  <div class="card shadow-sm p-4" style="max-width: 600px; width: 100%;">
    <h2 class="mb-4 text-center">{{ isEditMode ? 'Modifier' : 'Nouvelle' }} tâche</h2>

    <div *ngIf="loading" class="text-center my-3">
      <div class="spinner-border text-dark" role="status"></div>
    </div>

    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <form *ngIf="!loading" (ngSubmit)="onSubmit()" #taskForm="ngForm">
      <div class="mb-3">
        <label for="title" class="form-label">Titre</label>
        <input type="text" class="form-control" id="title" [(ngModel)]="task.title" name="title" required>
      </div>

      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" rows="3" [(ngModel)]="task.description"
          name="description"></textarea>
      </div>

      <div class="mb-3">
        <label for="due_date" class="form-label">Date limite</label>
        <input type="date" class="form-control" id="due_date" [(ngModel)]="task.due_date" name="due_date" required>
      </div>

      <div class="mb-3">
        <label for="assigned_to" class="form-label">Assigner à</label>
        <select class="form-select" id="assigned_to" [(ngModel)]="task.assigned_to" name="assigned_to">
          <option [ngValue]="null">Non assigné</option>
          <option *ngFor="let member of projectMembers" [ngValue]="member.id">
            {{ member.username }} ({{ member.user_type }})
          </option>
        </select>
      </div>

      <div *ngIf="isEditMode" class="mb-3">
        <label for="status" class="form-label">Statut</label>
        <select class="form-select" id="status" [(ngModel)]="task.status" name="status">
          <option value="a_faire">À faire</option>
          <option value="en_cours">En cours</option>
          <option value="termine">Terminé</option>
        </select>
      </div>

      <div class="d-flex justify-content-end mt-4">
        <button type="submit" class="btn btn-dark" [disabled]="taskForm.invalid">Enregistrer</button>
        <a [routerLink]="['/projects', projectId]" class="btn btn-outline-secondary ms-2">Annuler</a>
      </div>
    </form>
  </div>
</div>
