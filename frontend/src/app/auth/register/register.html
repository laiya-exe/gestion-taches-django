<div class="register-container container mt-5" style="max-width: 400px;">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Inscription</h2>

        <div *ngIf="error" class="text-danger mb-3 text-center">{{ error }}</div>

        <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
            <div class="mb-3">
                <label for="username" class="form-label">Nom d'utilisateur</label>
                <input type="text" class="form-control" id="username" [(ngModel)]="userData.username" name="username"
                    required />
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" [(ngModel)]="userData.email" name="email" required
                    email />
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Mot de passe</label>
                <input type="password" class="form-control" id="password" [(ngModel)]="userData.password"
                    name="password" required />
            </div>

            <div class="mb-3">
                <label for="user_type" class="form-label">Type d'utilisateur</label>
                <select class="form-select" id="user_type" [(ngModel)]="userData.user_type" name="user_type" required>
                    <option value="etudiant">Étudiant</option>
                    <option value="professeur">Professeur</option>
                </select>
            </div>

            <button type="submit" class="btn btn-dark w-100" [disabled]="registerForm.invalid">
                S'inscrire
            </button>
        </form>

        <p class="mt-3 text-center">
            Déjà inscrit ? <a routerLink="/auth/login">Se connecter</a>
        </p>
    </div>
</div>

<style>
    .card {
        border-radius: 0.75rem;
        background-color: #fff;
    }

    .btn-dark {
        font-weight: 500;
        padding: 0.5rem 1rem;
        transition: background-color 0.2s, transform 0.2s;
    }

    .btn-dark:hover {
        background-color: #222;
        transform: translateY(-1px);
    }

    .text-danger {
        font-size: 0.875rem;
    }

    .register-container a {
        text-decoration: none;
        color: #0d6efd;
        transition: color 0.2s;
    }

    .register-container a:hover {
        color: #084298;
    }
</style>
