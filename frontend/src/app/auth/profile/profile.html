<div class="container mt-5" style="max-width: 900px;">
    <div class="row g-4">

        <!-- Profil Utilisateur -->
        <div class="col-md-6">
            <div class="card shadow-lg p-4 rounded-4">
                <h2 class="mb-4">Informations personnelles</h2>

                <!-- Alertes -->
                <div *ngIf="message" class="alert alert-success alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div *ngIf="error" class="alert alert-danger alert-dismissible fade show">
                    {{ error }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Formulaire Profil -->
                <form [formGroup]="profileForm" (ngSubmit)="updateProfile()">

                    <div class="text-center mb-4">
                        <div class="position-relative d-inline-block">
                            <img [src]="authService.currentUser?.avatar || 'https://via.placeholder.com/120'"
                                alt="avatar" class="rounded-circle border border-secondary"
                                style="width:120px; height:120px; object-fit:cover;">
                            <label
                                class="position-absolute bottom-0 end-0 bg-dark text-white rounded-circle p-2 cursor-pointer"
                                style="cursor:pointer;" title="Changer l’avatar">
                                <i class="fas fa-camera"></i>
                                <input type="file" (change)="onFileSelected($event)" accept="image/*" hidden>
                            </label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nom d'utilisateur</label>
                        <input type="text" class="form-control" formControlName="username" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" formControlName="email"
                            placeholder="exemple@domaine.com">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Prénom</label>
                        <input type="text" class="form-control" formControlName="first_name" placeholder="Votre prénom">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nom</label>
                        <input type="text" class="form-control" formControlName="last_name" placeholder="Votre nom">
                    </div>

                    <button type="submit" class="btn btn-dark w-100">
                        <i class="fas fa-save me-2"></i> Mettre à jour
                    </button>
                </form>
            </div>
        </div>

        <!-- Changer le mot de passe -->
        <div class="col-md-6">
            <div class="card shadow-lg p-4 rounded-4">
                <h2 class="mb-4">Changer de mot de passe</h2>

                <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">

                    <div class="mb-3">
                        <label class="form-label">Ancien mot de passe</label>
                        <input type="password" class="form-control" formControlName="old_password"
                            placeholder="••••••••">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nouveau mot de passe</label>
                        <input type="password" class="form-control" formControlName="new_password"
                            placeholder="••••••••">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirmer</label>
                        <input type="password" class="form-control" formControlName="confirm_password"
                            placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn btn-warning w-100">
                        <i class="fas fa-key me-2"></i> Changer le mot de passe
                    </button>
                </form>
            </div>
        </div>

    </div>
</div>

<style>
    /* Cards */
    .card {
        background-color: #fff;
        border-radius: 1rem;
    }

    /* Boutons */
    .btn-dark,
    .btn-warning {
        font-weight: 500;
        padding: 0.5rem 1rem;
        transition: background-color 0.2s, transform 0.2s;
    }

    .btn-dark:hover {
        background-color: #222;
        transform: translateY(-1px);
    }

    .btn-warning:hover {
        background-color: #e0a800;
        transform: translateY(-1px);
    }

    /* Inputs */
    .form-control:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, .25);
    }

    /* Avatar label hover */
    .cursor-pointer:hover {
        background-color: #333 !important;
    }

    /* Alertes */
    .alert {
        font-size: 0.875rem;
    }
</style>
