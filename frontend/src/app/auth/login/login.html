<div class="login-container container mt-5" style="max-width: 400px;">
    <div class="card shadow-lg p-4 rounded-4">
        <!-- Illustration / Icône -->
        <div class="text-center mb-4">
            <i class="fas fa-user-circle fa-5x text-secondary"></i>
        </div>

        <h2 class="text-center mb-4">Connexion</h2>

        <!-- Message d'erreur global -->
        <div class="text-danger mb-3 text-center" *ngIf="error">
            {{ error }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <!-- Nom d'utilisateur avec icône -->
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input id="username" type="text" formControlName="username" class="form-control"
                    placeholder="Nom d'utilisateur" />
            </div>
            <div class="text-danger small mb-2"
                *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid">
                Le nom d'utilisateur est requis
            </div>

            <!-- Mot de passe -->
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" formControlName="password"
                    class="form-control" placeholder="Mot de passe" />
            </div>
            <div class="text-danger small mb-2"
                *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
                Le mot de passe est requis
            </div>

            <!-- Bouton de connexion -->
            <button type="submit" class="btn btn-dark w-100" [disabled]="loginForm.invalid">
                <i class="fas fa-sign-in-alt me-2"></i> Se connecter
            </button>
        </form>

        <!-- Lien vers inscription -->
        <p class="text-center mt-3">
            Pas de compte ? <a routerLink="/auth/register">Créer un compte</a>
        </p>
    </div>
</div>

<style>
    .card {
        border-radius: 1rem;
        background-color: #fff;
    }

    /* Boutons */
    .btn-dark {
        font-weight: 500;
        padding: 0.5rem 1rem;
        transition: background-color 0.2s, transform 0.2s;
    }

    .btn-dark:hover {
        background-color: #222;
        transform: translateY(-1px);
    }

    /* Inputs focus */
    .form-control:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, .25);
    }

    /* Icône dans input */
    .input-group-text {
        background-color: #f8f9fa;
        border-right: none;
    }

    .input-group .form-control {
        border-left: none;
    }

    /* Curseur pour show/hide */
    .cursor-pointer {
        cursor: pointer;
    }

    /* Lien inscription/forgot */
    .text-decoration-none {
        color: #0d6efd;
        transition: color 0.2s;
    }

    .text-decoration-none:hover {
        color: #084298;
    }

    /* Illustration en haut */
    .fa-user-circle {
        color: #6c757d;
    }
</style>
